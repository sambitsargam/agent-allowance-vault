[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# Pharos networks
[rpc_endpoints]
atlantic = "https://atlantic.dplabs-internal.com"
